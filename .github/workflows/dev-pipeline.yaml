# step 1 anything you want to call - so lets dev branch 
name: dev pipeline

#Step2  (when) this pipeline trigger

on:
  push:
    branches:
      - feature
      - master

#step3 - (Where) this pipeline 
jobs:
        build:
          runs-on: ubuntu-latest

# Step 4 - (What will be executed like steps)

#---------------------------------#
#push changes in feature
#code testing - lint 
#vulnerabilities testing
#build docker images
#push images - public/private 
#deploy in docker compose for testing.  
#---------------------------------#

          steps:
            - name: Checkout code
              uses: actions/checkout@v2

            - name: Setup python
              uses: actions/setup-python@v2
              with:
                python-version: '3.8'

            - name: Setup Docker 
              uses: docker/setup-buildx-action@v2

            - name: Dependency install
              run: |
                    python -m pip install --upgrade pip 
                    pip install --upgrade pip
                    pip install flake8

            # - name: lint testing
            #   run: flake8 --ignore=E501,F401 . 

            # Docker credentials
            - name: Login docker hub
              uses: docker/login-action@v2
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}
                registry: docker.io

              
            # Tags management - setup veriables 
            - name: tagging images
              id: vars
              run: | 
                echo "SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV
                echo "IMAGE_TAG=${GITHUB_RUN_NUMBER}" >> $GITHUB_ENV


            ## Image build for frontend 
            - name: frontend docker images
              id: frontend
              run: |
                docker build \
                  -t ${{ secrets.DOCKER_USERNAME }}/frontend:dev-latest \
                  -t ${{ secrets.DOCKER_USERNAME }}/frontend:dev-${{ env.IMAGE_TAG }} \
                  -t ${{ secrets.DOCKER_USERNAME }}/frontend:dev-${{ env.SHORT_SHA }} \
                  ./frontend


